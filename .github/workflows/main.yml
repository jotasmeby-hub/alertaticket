name: 🎵 Monitor de Conciertos

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      sector_prueba:
        description: "🧪 Sector inventado para probar la alerta (ej: 'Platea VIP'). Déjalo vacío para correr normal."
        type: string
        default: ""

jobs:
  check-tickets:
    name: Chequear disponibilidad
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 📂 Restaurar estado previo
        uses: actions/cache@v4
        with:
          path: estado_previo.json
          key: tm-monitor-conciertos-v1
          restore-keys: tm-monitor-conciertos-v1

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependencias
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 🔍 Chequear disponibilidad
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SECTOR_PRUEBA:    ${{ inputs.sector_prueba }}
        run: |
          python - <<'PYEOF'
          import os, json, asyncio, requests
          from datetime import datetime, timezone, timedelta

          EVENTOS = [
              {
                  "id":     "gorillaz",
                  "nombre": "Gorillaz Chile 2026 🎸",
                  "url":    "https://www.ticketmaster.cl/event/gorillaz-live-2026-scl-venta-general",
                  "sectores_iniciales": {
                      "pit",
                      "pacifico sur",
                      "pacífico sur",
                      "cancha frontal",
                  },
              },
              {
                  "id":     "robbie",
                  "nombre": "Robbie Williams 2026 🎤",
                  "url":    "https://www.ticketmaster.cl/event/robbie-williams-2026-venta-general",
                  "sectores_iniciales": {
                      "cancha frontal",
                      "cancha general",
                      "accesibilidad universal",
                  },
              },
          ]

          HEARTBEAT_HORA_UTC = 13
          HEARTBEAT_HORAS    = 24

          TELEGRAM_TOKEN   = os.environ.get("TELEGRAM_TOKEN", "")
          TELEGRAM_CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")
          SECTOR_PRUEBA    = os.environ.get("SECTOR_PRUEBA", "").strip()

          def send_telegram(msg: str) -> bool:
              if not TELEGRAM_TOKEN or not TELEGRAM_CHAT_ID:
                  print("  ⚠️  Sin credenciales Telegram")
                  return False
              try:
                  r = requests.post(
                      f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage",
                      json={"chat_id": TELEGRAM_CHAT_ID, "text": msg,
                            "parse_mode": "HTML", "disable_web_page_preview": False},
                      timeout=10)
                  r.raise_for_status()
                  print("  ✅ Telegram OK")
                  return True
              except Exception as e:
                  print(f"  ❌ Telegram error: {e}")
                  return False

          def normalizar(texto: str) -> str:
              import unicodedata
              t = unicodedata.normalize("NFKD", texto.lower())
              return "".join(c for c in t if not unicodedata.combining(c)).strip()

          async def obtener_sectores(url: str) -> list:
              from playwright.async_api import async_playwright
              sectores = []
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(
                      headless=True,
                      args=["--no-sandbox", "--disable-dev-shm-usage"])
                  ctx = await browser.new_context(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                                 "Chrome/124.0.0.0 Safari/537.36",
                      locale="es-CL",
                      timezone_id="America/Santiago",
                      viewport={"width": 1440, "height": 900})
                  page = await ctx.new_page()
                  try:
                      await page.goto(url, wait_until="networkidle", timeout=28000)
                  except Exception:
                      try:
                          await page.goto(url, wait_until="domcontentloaded", timeout=28000)
                      except Exception as e:
                          print(f"  ⚠️  Goto falló: {e}")
                  await asyncio.sleep(7)
                  try:
                      texto  = await page.inner_text("body")
                      lineas = [l.strip() for l in texto.splitlines() if l.strip()]
                      print(f"  Página cargada: {len(lineas)} líneas")
                      for i, linea in enumerate(lineas):
                          ll = linea.lower().replace(" ", "")
                          if "desde$" in ll and any(c.isdigit() for c in linea):
                              if i > 0:
                                  nombre = lineas[i - 1].strip()
                                  if (2 < len(nombre) < 70
                                          and not nombre.lower().startswith("desde")
                                          and not nombre.startswith("$")):
                                      sectores.append(nombre)
                                      print(f"  ✅ Sector: '{nombre}'")
                  except Exception as e:
                      print(f"  ⚠️  Lectura falló: {e}")
                  await browser.close()
              return sectores

          def cargar_estado() -> dict:
              if os.path.exists("estado_previo.json"):
                  try:
                      with open("estado_previo.json") as f:
                          return json.load(f)
                  except Exception:
                      pass
              return {}

          def guardar_estado(estado: dict):
              with open("estado_previo.json", "w") as f:
                  json.dump(estado, f, ensure_ascii=False, indent=2)

          def debe_heartbeat(ultimo_hb, ahora: datetime) -> bool:
              if not ultimo_hb:
                  return ahora.hour == HEARTBEAT_HORA_UTC
              try:
                  dt = datetime.fromisoformat(ultimo_hb)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return (ahora - dt).total_seconds() / 3600 >= HEARTBEAT_HORAS \
                         and ahora.hour == HEARTBEAT_HORA_UTC
              except Exception:
                  return False

          # ══════════════════════════════════════════════════════════════════════
          ahora_utc = datetime.now(timezone.utc)
          hora_scl  = ahora_utc - timedelta(hours=4)

          print("=" * 55)
          print(f"  🎵 {ahora_utc.strftime('%Y-%m-%d %H:%M UTC')} ({hora_scl.strftime('%H:%M')} SCL)")
          if SECTOR_PRUEBA:
              print(f"  🧪 MODO PRUEBA — sector inyectado: '{SECTOR_PRUEBA}'")
          print("=" * 55)

          estado_global = cargar_estado()
          estado_nuevo  = {}

          for evento in EVENTOS:
              eid     = evento["id"]
              nombre  = evento["nombre"]
              url     = evento["url"]
              si_norm = {normalizar(s) for s in evento["sectores_iniciales"]}

              print(f"\n{'─'*55}")
              print(f"  {nombre}")
              print(f"{'─'*55}")

              ev_estado    = estado_global.get(eid, {})
              primera_vez  = ev_estado.get("primera_vez", True)
              panel_prev   = set(ev_estado.get("sectores_panel", []))
              checks_ok    = ev_estado.get("checks_ok", 0)
              checks_err   = ev_estado.get("checks_err", 0)
              primer_check = ev_estado.get("primer_check", ahora_utc.isoformat())
              ultimo_hb    = ev_estado.get("ultimo_heartbeat")

              sectores    = asyncio.run(obtener_sectores(url))
              panel_ahora = set(sectores)
              carga_ok    = len(panel_ahora) > 0

              if carga_ok:
                  checks_ok += 1
              else:
                  checks_err += 1

              # ── Inyectar sector de prueba ────────────────────────────────────
              # Se suma al panel real → la comparación lo verá como "nuevo"
              # No modifica sectores_iniciales → pasa el filtro → dispara alerta real
              if SECTOR_PRUEBA:
                  panel_ahora.add(SECTOR_PRUEBA)
                  print(f"  🧪 Sector inyectado en panel: '{SECTOR_PRUEBA}'")

              print(f"  Panel actual: {', '.join(sorted(panel_ahora))}")
              print(f"  Panel previo: {', '.join(sorted(panel_prev)) or '(vacío)'}")

              sectores_nuevos    = panel_ahora - panel_prev
              sectores_perdidos  = panel_prev  - panel_ahora
              sectores_a_alertar = {
                  s for s in sectores_nuevos
                  if normalizar(s) not in si_norm
              }

              print(f"  A alertar: {', '.join(sorted(sectores_a_alertar)) or 'ninguno'}")

              # ── Notificaciones ───────────────────────────────────────────────
              if sectores_a_alertar and not primera_vez:
                  prueba_tag = " <i>(PRUEBA)</i>" if SECTOR_PRUEBA else ""
                  lista = "\n".join(f"  🎟 <b>{s}</b>" for s in sorted(sectores_a_alertar))
                  msg = (
                      f"🚨 <b>¡Nueva zona disponible!{prueba_tag}</b>\n"
                      f"<b>{nombre}</b>\n\n"
                      f"{lista}\n\n"
                      f"⚡ Compra AHORA:\n{url}\n\n"
                      f"🕐 {hora_scl.strftime('%H:%M')} Santiago"
                  )
                  send_telegram(msg)
                  print(f"  🚨 ALERTA enviada.")

              elif primera_vez:
                  panel_str = "\n".join(f"  ✅ {s}" for s in sorted(panel_ahora)) \
                              or "  ⚠️ No se detectaron sectores"
                  send_telegram(
                      f"👀 <b>Monitoreando: {nombre}</b>\n\n"
                      f"<b>Disponibles ahora:</b>\n{panel_str}\n\n"
                      f"Te aviso si aparece cualquier sector nuevo 🔄"
                  )
                  print("  📨 Mensaje de inicio enviado.")

              else:
                  print("  ✅ Sin cambios.")

              if sectores_perdidos and not primera_vez:
                  send_telegram(
                      f"😞 <b>Sector se agotó – {nombre}</b>\n"
                      f"Ya no disponible: {', '.join(sorted(sectores_perdidos))}\n"
                      f"Seguimos monitoreando..."
                  )

              # ── Heartbeat diario ─────────────────────────────────────────────
              if not primera_vez and not SECTOR_PRUEBA and debe_heartbeat(ultimo_hb, ahora_utc):
                  total = checks_ok + checks_err
                  tasa  = int(checks_ok / total * 100) if total else 0
                  icon  = "✅" if tasa >= 90 else ("⚠️" if tasa >= 70 else "❌")
                  try:
                      dt0 = datetime.fromisoformat(primer_check).replace(tzinfo=timezone.utc)
                      dias = (ahora_utc - dt0).days
                      hrs  = int((ahora_utc - dt0).total_seconds() / 3600)
                      tiempo_str = f"{dias}d {hrs%24}h" if dias else f"{hrs}h"
                  except Exception:
                      tiempo_str = "?"
                  panel_hb = "\n".join(f"  · {s}" for s in sorted(panel_ahora)) \
                             or "  ⚠️ Panel no cargó"
                  send_telegram(
                      f"📊 <b>Resumen diario – {nombre}</b>\n"
                      f"────────────────────────\n"
                      f"{icon} {'OK' if tasa>=90 else 'Con errores' if tasa>=70 else 'Revisar'}\n"
                      f"⏱ Activo: {tiempo_str} | Checks: {total} ({tasa}% OK)\n\n"
                      f"<b>Sectores disponibles:</b>\n{panel_hb}\n\n"
                      f"<i>Próximo resumen mañana ~9:00 AM 🇨🇱</i>"
                  )
                  print("  📊 Heartbeat enviado.")
                  ultimo_hb = ahora_utc.isoformat()

              # ── Guardar estado ───────────────────────────────────────────────
              # En modo prueba: NO guardamos el sector falso en el estado
              panel_a_guardar = set(sectores) if carga_ok else panel_prev
              estado_nuevo[eid] = {
                  "sectores_panel":   list(panel_a_guardar),
                  "primera_vez":      False,
                  "checks_ok":        checks_ok,
                  "checks_err":       checks_err,
                  "ultimo_heartbeat": ultimo_hb,
                  "primer_check":     primer_check,
                  "ultimo_check":     ahora_utc.isoformat(),
              }

          guardar_estado(estado_nuevo)
          print(f"\n{'='*55}")
          print(f"  ✅ Listo.")
          print(f"{'='*55}")
          PYEOF

      - name: 💾 Guardar estado
        uses: actions/cache@v4
        if: always()
        with:
          path: estado_previo.json
          key: tm-monitor-conciertos-v1
