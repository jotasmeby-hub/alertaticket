name: 🎸 Gorillaz Ticket Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-tickets:
    name: Chequear disponibilidad
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 📂 Restaurar estado previo
        uses: actions/cache@v4
        with:
          path: estado_previo.json
          key: tm-estado-gorillaz-v2
          restore-keys: tm-estado-gorillaz-v2

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependencias
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 🔍 Chequear disponibilidad
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, sys, json, asyncio, requests
          from datetime import datetime

          EVENT_URL  = "https://www.ticketmaster.cl/event/gorillaz-live-2026-scl-venta-general"
          EVENT_NAME = "Gorillaz Chile 2026 🎸"

          # Zonas AGOTADAS que queremos vigilar.
          # Alerta cuando APAREZCAN en el panel derecho con precio.
          ZONAS_OBJETIVO = [
              "cancha general",
              "tribuna central",
              "tribuna",
          ]

          TELEGRAM_TOKEN   = os.environ.get("TELEGRAM_TOKEN", "")
          TELEGRAM_CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")

          def send_telegram(msg):
              if not TELEGRAM_TOKEN or not TELEGRAM_CHAT_ID:
                  print("⚠️  Sin credenciales Telegram")
                  return False
              try:
                  r = requests.post(
                      f"https://api.telegram.org/bot{TELEGRAM_TOKEN}/sendMessage",
                      json={"chat_id": TELEGRAM_CHAT_ID, "text": msg,
                            "parse_mode": "HTML", "disable_web_page_preview": False},
                      timeout=10)
                  r.raise_for_status()
                  print("✅ Telegram OK")
                  return True
              except Exception as e:
                  print(f"❌ Telegram error: {e}")
                  return False

          async def obtener_sectores_disponibles():
              """
              Abre la página y lee el panel 'Seleccionar sector'.
              Solo los sectores que aparecen AHÍ con precio están disponibles.
              Los grises (agotados) simplemente no aparecen en ese panel.
              """
              from playwright.async_api import async_playwright

              sectores_con_precio = []

              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(
                      headless=True,
                      args=["--no-sandbox", "--disable-dev-shm-usage"])

                  ctx = await browser.new_context(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                                 "Chrome/124.0.0.0 Safari/537.36",
                      locale="es-CL",
                      timezone_id="America/Santiago",
                      viewport={"width": 1440, "height": 900})

                  page = await ctx.new_page()

                  try:
                      await page.goto(EVENT_URL, wait_until="networkidle", timeout=28000)
                  except Exception:
                      try:
                          await page.goto(EVENT_URL, wait_until="domcontentloaded", timeout=28000)
                      except Exception as e:
                          print(f"⚠️  Goto falló: {e}")

                  # Esperar que el JS cargue el panel de sectores
                  await asyncio.sleep(7)

                  # Leer el texto de la página línea por línea
                  # El panel tiene formato:
                  #   NombreSector
                  #   Desde $ 150.000 + $ 22.500
                  #   Numerado / Sin numerar
                  try:
                      texto = await page.inner_text("body")
                      lineas = [l.strip() for l in texto.splitlines() if l.strip()]

                      print(f"   Texto cargado: {len(lineas)} líneas")

                      for i, linea in enumerate(lineas):
                          linea_lower = linea.lower()
                          # Detectar línea de precio
                          if ("desde $" in linea_lower or "desde$" in linea_lower.replace(" ", "")) \
                              and any(c.isdigit() for c in linea):
                              # La línea anterior es el nombre del sector
                              if i > 0:
                                  nombre = lineas[i - 1].strip()
                                  # Filtrar líneas que no son nombres de sector
                                  if (len(nombre) > 2 and len(nombre) < 60
                                          and not nombre.startswith("$")
                                          and not nombre.lower().startswith("desde")):
                                      sectores_con_precio.append(nombre)
                                      print(f"   ✅ Panel sector: '{nombre}' | precio: {linea[:40]}")

                  except Exception as e:
                      print(f"⚠️  Lectura texto falló: {e}")

                  await browser.close()

              return sectores_con_precio

          def normalizar(texto: str) -> str:
              import unicodedata
              t = unicodedata.normalize('NFKD', texto.lower())
              return ''.join(c for c in t if not unicodedata.combining(c)).strip()

          def zona_en_panel(zona_objetivo: str, sectores_panel: list) -> bool:
              """True si la zona objetivo aparece en el panel (= está disponible)."""
              zn = normalizar(zona_objetivo)
              for s in sectores_panel:
                  sn = normalizar(s)
                  if zn in sn or sn in zn:
                      return True
              return False

          def cargar_estado():
              if os.path.exists("estado_previo.json"):
                  try:
                      with open("estado_previo.json") as f:
                          return json.load(f)
                  except Exception:
                      pass
              return {"zonas_disponibles": [], "sectores_panel": [], "primera_vez": True}

          def guardar_estado(e):
              with open("estado_previo.json", "w") as f:
                  json.dump(e, f, ensure_ascii=False, indent=2)

          # ── MAIN ─────────────────────────────────────────────────────────────
          print("=" * 55)
          print(f"  🎸 Check: {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}")
          print("=" * 55)

          estado_previo = cargar_estado()
          primera_vez   = estado_previo.get("primera_vez", True)
          zonas_prev    = set(estado_previo.get("zonas_disponibles", []))
          panel_prev    = set(estado_previo.get("sectores_panel", []))

          print("\n🎭 Cargando página con Playwright...")
          sectores_panel = asyncio.run(obtener_sectores_disponibles())

          print(f"\n📋 Sectores en panel de compra ({len(sectores_panel)}):")
          for s in sectores_panel:
              print(f"   · {s}")
          if not sectores_panel:
              print("   ⚠️  Panel vacío (posible error de carga)")

          # Qué zonas objetivo están disponibles ahora
          disponibles_ahora = set()
          for zona in ZONAS_OBJETIVO:
              if zona_en_panel(zona, sectores_panel):
                  disponibles_ahora.add(zona)

          zonas_nuevas   = disponibles_ahora - zonas_prev
          zonas_perdidas = zonas_prev - disponibles_ahora
          panel_cambio   = set(normalizar(s) for s in sectores_panel) != \
                           set(normalizar(s) for s in panel_prev) and panel_prev

          print(f"\n   Disponibles ahora: {disponibles_ahora or 'ninguna (correcto)'}")
          print(f"   Previas:           {zonas_prev or 'ninguna'}")
          print(f"   Nuevas:            {zonas_nuevas or 'ninguna'}")

          # ── NOTIFICACIONES ────────────────────────────────────────────────────
          if zonas_nuevas and not primera_vez:
              zonas_str = ", ".join(z.upper() for z in sorted(zonas_nuevas))
              msg = (f"🚨🎸 <b>¡GORILLAZ – TICKETS DISPONIBLES!</b>\n\n"
                     f"📍 Zona(s) habilitadas: <b>{zonas_str}</b>\n\n"
                     f"⚡ Compra AHORA:\n{EVENT_URL}\n\n"
                     f"🕐 {datetime.utcnow().strftime('%H:%M UTC')}")
              send_telegram(msg)
              print(f"\n🚨 ALERTA ENVIADA: {zonas_nuevas}")

          elif primera_vez:
              panel_str = "\n".join(f"  ✅ {s}" for s in sectores_panel) \
                          or "  (no se detectaron sectores)"
              objetivo_str = "\n".join(
                  f"  {'🟢' if z in disponibles_ahora else '🔴'} {z.title()}"
                  for z in ZONAS_OBJETIVO)
              msg = (f"👀 <b>Monitor activo – {EVENT_NAME}</b>\n\n"
                     f"<b>Disponibles ahora en panel:</b>\n{panel_str}\n\n"
                     f"<b>Vigilando (agotadas):</b>\n{objetivo_str}\n\n"
                     f"Te aviso cuando alguna aparezca 🔄")
              send_telegram(msg)
              print("📨 Mensaje de inicio enviado.")

          elif panel_cambio and not zonas_nuevas:
              sectores_str = ", ".join(sectores_panel[:6])
              msg = (f"⚠️ <b>El panel cambió – {EVENT_NAME}</b>\n\n"
                     f"Sectores ahora: {sectores_str}\n"
                     f"Tus zonas aún no aparecen. Seguimos monitoreando.\n"
                     f"👉 {EVENT_URL}")
              send_telegram(msg)
              print("⚠️  Cambio en panel, aviso enviado.")

          else:
              print("✅ Sin cambios. Todo normal.")

          if zonas_perdidas and not primera_vez:
              msg = (f"😞 <b>Volvieron a agotarse – {EVENT_NAME}</b>\n"
                     f"Zonas: {', '.join(z.upper() for z in zonas_perdidas)}\n"
                     f"Seguimos monitoreando...")
              send_telegram(msg)

          guardar_estado({
              "zonas_disponibles": list(disponibles_ahora),
              "sectores_panel": sectores_panel,
              "primera_vez": False,
              "ultimo_check": datetime.utcnow().isoformat(),
          })
          print("\n✅ Listo. Próximo check en ~5 min.")
          PYEOF

      - name: 💾 Guardar estado
        uses: actions/cache@v4
        if: always()
        with:
          path: estado_previo.json
          key: tm-estado-gorillaz-v2
